server:
  port: 8081

spring:
  application:
    name: user-auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/user_auth_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true