server:
  port: 8082

spring:
  application:
    name: product-catalog-service
  datasource:
    url: jdbc:mysql://localhost:3306/product_catalog_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true