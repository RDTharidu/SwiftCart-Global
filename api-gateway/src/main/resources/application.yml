server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        # 1. User Auth Service එකට යන පාර
        - id: user-auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        # 2. Product Catalog Service එකට යන පාර
        - id: product-catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**

        
        - id: order-processing-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**

        
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/inventory/**

        
        - id: notification-logging-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/logs/**