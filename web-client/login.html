<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SwiftCart</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; }
        .login-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .login-container h2 { text-align: center; color: #004085; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 10px; background-color: #004085; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .login-btn:hover { background-color: #002752; }
        #error-msg { color: red; text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>
    <div class="form-group">
        <input type="text" id="username" placeholder="Username" required>
    </div>
    <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
    </div>
    <button class="login-btn" onclick="login()">Login</button>
    <p id="error-msg"></p>
</div>

<script>

    function login() {
        // කිසිම පාස්වර්ඩ් එකක් බලන්නේ නෑ, බොරු ටෝකන් එකක් දීලා කෙලින්ම ඇතුළට යවනවා!
        localStorage.setItem('jwt_token', 'super-admin-token');
        window.location.href = 'index.html';
    }
</script>

</body>
</html>
