<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftCart | Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #00325b;
            --primary-blue: #049fd9;
            --light-bg: #f4f7f6;
            --text-dark: #333333;
            --white: #ffffff;
            --danger: #d32f2f;
            --warning: #fbc02d;
            --success: #2e7d32;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--light-bg); margin: 0; }
        
        nav { background-color: var(--primary-navy); color: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav .logo { font-size: 1.5rem; font-weight: 700; }
        nav .logo span { color: var(--primary-blue); }

        .container { max-width: 1200px; margin: 20px auto; padding: 0 2rem; }

        /* Dashboard Analytics Cards (EXTRA FEATURE) */
        .dashboard-stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 8px; flex: 1; text-align: center; border-bottom: 4px solid var(--primary-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0 0 10px 0; color: var(--text-dark); font-size: 1.1rem; }
        .stat-card .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary-navy); }

        /* Control Panel */
        .control-panel { background: var(--white); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 4px solid var(--success); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; width: 100%; box-sizing: border-box;}
        
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; color: var(--white); transition: 0.3s; }
        .btn-primary { background-color: var(--primary-navy); }
        .btn-primary:hover { background-color: var(--primary-blue); }
        .btn-danger { background-color: var(--danger); padding: 5px 10px; font-size: 0.9rem; margin-top: 10px;}
        .btn-warning { background-color: var(--warning); color: #000; padding: 5px 10px; font-size: 0.9rem; margin-top: 10px;}
        .btn-search { background-color: var(--success); }

        .search-bar { display: flex; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .product-card { background: var(--white); border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--primary-blue); }
        .product-card h3 { margin: 0 0 10px 0; color: var(--primary-navy); }
        .price { font-size: 1.2rem; font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🌐 SwiftCart <span>Admin Portal</span></div>
        <div>System v1.1 (CRUD + Analytics)</div>
    </nav>

    <div class="container">
        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>📦 Total Products in Catalog</h3>
                <div class="stat-value" id="stat-total-prod">0</div>
            </div>
            <div class="stat-card">
                <h3>💰 Total Inventory Value</h3>
                <div class="stat-value" id="stat-total-value">Rs. 0.00</div>
            </div>
        </div>

        <div class="control-panel">
            <h2 style="margin-top:0;">🛠️ Manage Products</h2>
            <input type="hidden" id="prod-id">
            <div class="form-grid">
                <input type="text" id="prod-name" placeholder="Product Name">
                <input type="text" id="prod-desc" placeholder="Description">
                <input type="number" id="prod-price" placeholder="Price (LKR)">
                <input type="number" id="prod-stock" placeholder="Stock Quantity">
            </div>
            <button class="btn btn-primary" onclick="saveProduct()" id="save-btn">➕ Add New Product</button>
            <button class="btn btn-warning" onclick="clearForm()" style="display:none;" id="cancel-btn">Cancel Edit</button>

            <div class="search-bar">
                <input type="text" id="search-keyword" placeholder="Search products...">
                <button class="btn btn-search" onclick="searchProducts()">🔍 Search</button>
                <button class="btn btn-primary" onclick="loadProducts()">🔄 Load All</button>
            </div>
        </div>

        <div class="product-grid" id="product-list"></div>
    </div>

    <script>
        const GATEWAY_URL = 'http://localhost:8080/api/v1/products';
        window.onload = loadProducts;

        function loadProducts() {
            fetch(GATEWAY_URL)
                .then(res => res.json())
                .then(data => displayProducts(data))
                .catch(err => console.error(err));
        }

        function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const productData = {
                name: document.getElementById('prod-name').value,
                description: document.getElementById('prod-desc').value,
                price: parseFloat(document.getElementById('prod-price').value),
                stockQuantity: parseInt(document.getElementById('prod-stock').value)
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${GATEWAY_URL}/${id}` : GATEWAY_URL;

            fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            }).then(res => {
                if(res.ok) {
                    clearForm();
                    loadProducts();
                }
            });
        }

        function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                fetch(`${GATEWAY_URL}/${id}`, { method: 'DELETE' }).then(res => { if(res.ok) loadProducts(); });
            }
        }

        function searchProducts() {
            const keyword = document.getElementById('search-keyword').value;
            fetch(`${GATEWAY_URL}/search?keyword=${keyword}`)
                .then(res => res.json())
                .then(data => displayProducts(data));
        }

        function editProduct(id, name, desc, price, stock) {
            document.getElementById('prod-id').value = id;
            document.getElementById('prod-name').value = name;
            document.getElementById('prod-desc').value = desc;
            document.getElementById('prod-price').value = price;
            document.getElementById('prod-stock').value = stock;
            document.getElementById('save-btn').innerText = "💾 Update Product";
            document.getElementById('cancel-btn').style.display = "inline-block";
        }

        function clearForm() {
            document.getElementById('prod-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-desc').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('prod-stock').value = '';
            document.getElementById('save-btn').innerText = "➕ Add New Product";
            document.getElementById('cancel-btn').style.display = "none";
        }

        function displayProducts(data) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            
            // 🚀 EXTRA FEATURE LOGIC: Dashboard Analytics Calculation
            let totalValue = 0;
            document.getElementById('stat-total-prod').innerText = data.length;

            if(data.length === 0) {
                list.innerHTML = '<p>No products found.</p>';
                document.getElementById('stat-total-value').innerText = "Rs. 0.00";
                return;
            }

            data.forEach(p => {
                // Calculate Inventory Value (Price * Stock)
                totalValue += (p.price * p.stockQuantity);

                list.innerHTML += `
                    <div class="product-card">
                        <h3>💻 ${p.name}</h3>
                        <p><strong>ID:</strong> ${p.id} | <strong>Stock:</strong> ${p.stockQuantity}</p>
                        <p>${p.description}</p>
                        <div class="price">Rs. ${p.price.toLocaleString('en-LK', {minimumFractionDigits: 2})}</div>
                        <button class="btn btn-warning" onclick="editProduct(${p.id}, '${p.name}', '${p.description}', ${p.price}, ${p.stockQuantity})">✏️ Edit</button>
                        <button class="btn btn-danger" onclick="deleteProduct(${p.id})">🗑️ Delete</button>
                    </div>
                `;
            });

            // Update Total Value UI
            document.getElementById('stat-total-value').innerText = "Rs. " + totalValue.toLocaleString('en-LK', {minimumFractionDigits: 2});
        }
    </script>
</body>
</html>
